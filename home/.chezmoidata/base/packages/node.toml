[packages.base.node]

[packages.base.node.bun]
completion = {generate = "bun completions zsh"}
manager = "mise"

[packages.base.node.bun.policy]
deny = ["bun login *", "bun logout *", "bun publish *"]

[packages.base.node.node]
manager = "mise"
pin = "lts"
test = "node --version && npm --version && yarn --version && pnpm --version"

[packages.base.node.node.policy]
deny = [
  "npm access *",
  "npm adduser *",
  "npm login *",
  "npm logout *",
  "npm owner *",
  "npm publish *",
  "npm token *",
  "npm unpublish *",
  "pnpm login *",
  "pnpm logout *",
  "pnpm publish *",
  "pnpm unpublish *",
  "yarn login *",
  "yarn logout *",
  "yarn npm login *",
  "yarn npm logout *",
  "yarn npm publish *",
  "yarn publish *"
]
