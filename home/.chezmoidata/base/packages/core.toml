[packages.base.core]
atuin = {completion = {generate = "atuin gen-completions --shell zsh"}, manager = "mise"}
bat = {completion = {generate = "bat --completion zsh"}}
btop = {disabled = ["ephemeral"]}
curl = {}
direnv = {version = "direnv version"}
difftastic = {manager = "mise", bin = "difft"}
doggo = {completion = {generate = "doggo completions zsh"}, manager = "mise", package = "github:mr-karan/doggo"}
dust = {manager = "mise", package = "github:bootandy/dust"}
eza = {manager = "mise"}
fd = {}
fzf = {}
git-delta = {bin = "delta", completion = {generate = "delta --generate-completion zsh"}}
glow = {completion = true, manager = "mise", package = "github:charmbracelet/glow"}
gnupg = {bin = "gpg"}
greyproxy = {disabled = [
  "ephemeral"
], manager = "mise", package = "github:GreyhavenHQ/greyproxy"}
greywall = {disabled = [
  "ephemeral"
], manager = "mise", package = "github:GreyhavenHQ/greywall", completion = true}
hyperfine = {manager = "mise"}
jnv = {manager = "mise", package = "github:ynqa/jnv"}
jq = {}
lazygit = {completion = {generate = "lazygit completion zsh"}, manager = "mise"}
mkcert = {manager = "mise", policy = {deny = ["mkcert *"]}}
neovim = {bin = "nvim"}
openssh-client = {bin = "ssh", test = "command -v ssh && command -v ssh-agent && command -v ssh-add"}
ouch = {manager = "mise", package = "github:ouch-org/ouch"}
rage = {manager = "mise", package = "github:str4d/rage"}
ripgrep = {bin = "rg"}
sd = {manager = "mise"}
tealdeer = {bin = "tldr"}
tmux = {version = "tmux -V"}
topgrade = {completion = {generate = "topgrade --gen-completion zsh"}, manager = "mise", package = "github:topgrade-rs/topgrade", policy = {deny = [
  "topgrade *"
]}}
vivid = {manager = "mise"}
wget = {}
xh = {completion = {generate = "xh --generate complete-zsh"}, manager = "mise", package = "github:ducaale/xh"}
yazi = {manager = "mise", package = "github:sxyazi/yazi"}
zoxide = {}

[packages.base.core.chezmoi]
completion = true

[packages.base.core.chezmoi.policy]
deny = ["chezmoi --remove *", "chezmoi apply *"]

[packages.base.core.coreutils]
version = "realpath --version"

[packages.base.core.coreutils.policy]
deny = [
  # destructive filesystem
  "rm -rf /*",
  "rm -rf ~/*",
  "shred *",
  "mkfs *",
  "dd *",
  "diskutil erase*",
  "diskutil partition*",
  # privilege escalation
  "sudo *",
  "doas *",
  "su *",
  "su",
  # system power
  "shutdown *",
  "reboot *",
  "halt *",
  "poweroff *",
  # service management
  "systemctl stop *",
  "systemctl disable *",
  "systemctl mask *",
  "systemctl daemon-reload *",
  "launchctl unload *",
  "launchctl remove *",
  "launchctl bootout *",
  # scheduled tasks
  "crontab -e *",
  "crontab -r *",
  # in-place file mutation
  "sed -i *",
  "sed * -i *",
  # macOS keychain
  "security delete-*",
  "security add-*",
  "security set-*",
  "security unlock-keychain *",
  "security dump-keychain *",
  "security find-generic-password*",
  "security find-internet-password*",
  # system package managers (removal)
  "brew uninstall *",
  "brew remove *",
  "brew untap *",
  "apt remove *",
  "apt purge *",
  "apt-get remove *",
  "apt-get purge *",
  "dnf remove *",
  "pacman -R*",
  "snap remove *",
  # network exfiltration tools
  "nc *",
  "ncat *",
  "netcat *",
  "socat *",
  # credential extraction
  "gpg --export-secret*",
  # permission / ownership escalation
  "chmod 777 *",
  "chmod -R 777 *",
  "chmod o+w *",
  "chown * /*",
  "chown -R * /*",
  # destructive move of system paths
  "mv /* *",
  "mv /etc/* *",
  "mv /usr/* *",
  # symlink attacks on system dirs
  "ln -sf * /etc/*",
  "ln -sf * /usr/*",
  # process kill
  "kill -9 *",
  "killall *",
  "pkill *",
  # arbitrary execution wrappers
  "eval *",
  "exec *",
  # user/group management
  "useradd *",
  "userdel *",
  "usermod *",
  "groupadd *",
  "groupdel *",
  # mount/umount
  "mount *",
  "umount *",
  # firewall / network policy
  "iptables *",
  "ip6tables *",
  "nft *",
  "pfctl *",
  "ufw *",
  # disk / swap
  "swapon *",
  "swapoff *",
  "fdisk *",
  "parted *"
]

[packages.base.core.gh]
completion = {generate = "gh completion -s zsh"}

[packages.base.core.gh.policy]
deny = [
  "gh * delete*",
  "gh * edit *",
  "gh * secret *",
  "gh * variable set *",
  "gh api repos/* -X DELETE*",
  "gh auth login *",
  "gh auth logout *",
  "gh auth refresh *",
  "gh auth setup-git *",
  "gh auth token *"
]

[packages.base.core.git]

[packages.base.core.git.policy]
deny = [
  "git * clean *",
  "git * push --force*",
  "git * push -f *",
  "git * rebase *",
  "git * reset --hard *",
  "git * stash drop *",
  "git * stash pop *",
  "git * tag -d *",
  "git * worktree remove *",
  "git clean *",
  "git push --force*",
  "git push -f *",
  "git rebase *",
  "git reset --hard *",
  "git stash drop *",
  "git stash pop *",
  "git tag -d *",
  "git worktree remove *"
]

[packages.base.core.mise]
manager = "external"
completion = true

[packages.base.core.mise.policy]
deny = ["mise run apply *", "mise trust *", "mise untrust *"]

[packages.base.core.rclone]

[packages.base.core.rclone.policy]

# read-only operations allowed by default; no explicit deny needed
