[ai.agents]
pi = {}

[ai.permissions.paths]
deny = [
  "**/.env",
  "**/.env.*",
  "**/.keys/**",
  "**/secrets/**",
  "~/.config/age/**",
  "~/.ssh/**"
]

[ai.permissions.tools]
cloud = {allow = [
  "aws ec2 describe-",
  "aws iam get-",
  "aws s3 ls",
  "aws sts get-caller-identity",
  "az account show",
  "az group list"
], deny = [
  "aws iam delete",
  "aws s3 rm",
  "aws s3 sync"
]}
core = {allow = [
  "bat",
  "cat",
  "check-dotfiles",
  "chezmoi data",
  "chezmoi diff --color=false",
  "chezmoi doctor",
  "chezmoi managed",
  "chezmoi status",
  "chezmoi verify",
  "delta",
  "df",
  "difft",
  "direnv export",
  "direnv status",
  "du",
  "dust",
  "eza",
  "fd",
  "find",
  "gh api",
  "gh issue list",
  "gh issue view",
  "gh pr list",
  "gh pr view",
  "gh repo view",
  "git branch",
  "git config --get",
  "git diff",
  "git fetch",
  "git log",
  "git pull --ff-only",
  "git reflog",
  "git remote -v",
  "git rev-parse",
  "git show",
  "git stash list",
  "git status",
  "glow",
  "grep",
  "head",
  "hyperfine",
  "jnv",
  "jq",
  "ls",
  "mise current",
  "mise list",
  "mise ls",
  "mise run bootstrap",
  "mise run build-containers",
  "mise run lint",
  "mise run test",
  "mise tasks",
  "mise where",
  "pwd",
  "rg",
  "tail",
  "tldr",
  "tree",
  "wc",
  "yq"
], deny = [
  "chezmoi --remove",
  "chezmoi apply",
  "curl | bash",
  "curl | sh",
  "git clean -fd",
  "git push -f",
  "git push --force",
  "git reset --hard",
  "mise run apply",
  "rm",
  "rmdir",
  "sudo",
  "wget | bash",
  "wget | sh"
]}
docker = {allow = [
  "dive",
  "docker compose logs",
  "docker compose ps",
  "docker images",
  "docker info",
  "docker inspect",
  "docker logs",
  "docker ps",
  "docker version"
], deny = [
  "docker rm",
  "docker rmi",
  "docker system prune",
  "docker volume rm"
]}
golang = {allow = [
  "go build",
  "go env",
  "go fmt",
  "go test",
  "go vet",
  "go version",
  "gofmt"
], deny = [
]}
iac = {allow = [
  "terragrunt plan",
  "terragrunt validate",
  "tofu fmt",
  "tofu plan",
  "tofu show",
  "tofu validate"
], deny = [
  "terragrunt apply",
  "terragrunt destroy",
  "tofu apply",
  "tofu destroy"
]}
java = {allow = [
  "java -version",
  "mvn -v",
  "mvn test",
  "mvn verify"
], deny = [
]}
kubernetes = {allow = [
  "helm history",
  "helm list",
  "helm status",
  "k9s",
  "kubectl config get-",
  "kubectl describe",
  "kubectl get",
  "kubectl logs",
  "kubectl top",
  "kubectl version",
  "stern"
], deny = [
  "helm install",
  "helm rollback",
  "helm uninstall",
  "helm upgrade",
  "kubectl apply",
  "kubectl cordon",
  "kubectl delete",
  "kubectl drain",
  "kubectl edit"
]}
node = {allow = [
  "node --version",
  "npm --version",
  "npm run build",
  "npm run lint",
  "npm run test",
  "npm test",
  "pnpm run test",
  "pnpm test",
  "yarn test"
], deny = [
  "npm publish",
  "pnpm publish",
  "yarn publish"
]}
python = {allow = [
  "mypy",
  "pytest",
  "python -m pytest",
  "python3 --version",
  "ruff",
  "uv --version",
  "uv run pytest"
], deny = [
]}
rust = {allow = [
  "cargo build",
  "cargo check",
  "cargo clippy",
  "cargo fmt",
  "cargo test",
  "cargo --version",
  "rustc --version"
], deny = [
  "cargo publish"
]}

[ai.permissions.websites]
allow = [
  "cloud.google.com",
  "code.claude.com",
  "crates.io",
  "developer.hashicorp.com",
  "developers.openai.com",
  "doc.rust-lang.org",
  "docs.aws.amazon.com",
  "docs.github.com",
  "docs.python.org",
  "docs.rs",
  "geminicli.com",
  "github.com",
  "go.dev",
  "helm.sh",
  "kubernetes.io",
  "learn.microsoft.com",
  "nodejs.org",
  "opentofu.org",
  "pkg.go.dev",
  "pypi.org",
  "pi.dev",
  "raw.githubusercontent.com",
  "registry.terraform.io",
  "www.npmjs.com"
]

[ai.pi.packages]
"@juicesharp/rpiv-advisor" = {}
"@juicesharp/rpiv-args" = {}
"@juicesharp/rpiv-ask-user-question" = {}
"@juicesharp/rpiv-btw" = {}
"@juicesharp/rpiv-i18n" = {}
"@juicesharp/rpiv-pi" = {}
"@juicesharp/rpiv-todo" = {}
"@juicesharp/rpiv-voice" = {}
"@juicesharp/rpiv-web-tools" = {}
"@juicesharp/rpiv-workflow" = {}
"@tintinweb/pi-subagents" = {}
context-mode = {}
pi-caveman = {}
pi-cursor-sdk = {}
pi-hermes-memory = {}
pi-intercom = {}
pi-lens = {}
pi-mcp-adapter = {}
pi-observational-memory = {}
pi-simplify = {}

[ai.pi.profiles.home.default]
model = "deepseek-v4-flash"
provider = "opencode-go"
thinkingLevel = "high"
enabledModels = ["gpt-5*", "deepseek-*"]

[ai.pi.profiles.work.default]
model = "claude-sonnet-4.6"
provider = "github-copilot"
thinkingLevel = "medium"
enabledModels = ["claude-*", "gemini-3*", "gpt-5*"]

[ai.pi.routing.home]
light = {model = "deepseek-v4-flash", provider = "opencode-go", thinking = "off"}
standard = {model = "deepseek-v4-flash", provider = "opencode-go", thinking = "high"}
heavy = {model = "gpt-5.5", provider = "openai-codex", thinking = "high"}

[ai.pi.routing.work]
light = {model = "gpt-5-mini", provider = "github-copilot", thinking = "low"}
standard = {model = "claude-sonnet-4.6", provider = "github-copilot", thinking = "medium"}
heavy = {model = "claude-opus-4.6", provider = "github-copilot", thinking = "high"}

[ai.pi.settings]
theme = "dark"

[ai.pi.subagents]
light = [
  "artifacts-locator",
  "codebase-locator",
  "integration-scanner",
  "precedent-locator",
  "web-search-researcher"
]
standard = [
  "artifacts-analyzer",
  "codebase-analyzer",
  "codebase-pattern-finder",
  "peer-comparator",
  "scope-tracer"
]
heavy = [
  "artifact-code-reviewer",
  "artifact-coverage-reviewer",
  "claim-verifier",
  "diff-auditor",
  "slice-verifier"
]

[ai.skills]
addyosmani = {repo = "addyosmani/agent-skills", include = [
  "api-and-interface-design",
  "ci-cd-and-automation",
  "code-review-and-quality",
  "debugging-and-error-recovery",
  "documentation-and-adrs",
  "git-workflow-and-versioning",
  "incremental-implementation",
  "performance-optimization",
  "planning-and-task-breakdown",
  "security-and-hardening"
]}
anthropics = {repo = "anthropics/skills@main", include = [
  "mcp-builder",
  "skill-creator",
  "webapp-testing"
]}
next = {repo = "vercel-labs/next-skills@main", include = [
  "next-best-practices"
]}
supabase = {repo = "supabase/agent-skills", include = [
  "supabase-postgres-best-practices"
]}
vercel = {repo = "vercel-labs/agent-skills@main", include = [
  "composition-patterns",
  "react-best-practices",
  "web-design-guidelines"
]}
vuejs = {repo = "vuejs-ai/skills@main", include = [
  "vue-best-practices",
  "vue-pinia-best-practices",
  "vue-router-best-practices",
  "vue-testing-best-practices"
]}
