[packages.base.cloud]
aws = {manager = "mise", package = "aws-cli"}
azure-cli = {bin = "az"}

[packages.base.core]
atuin = {manager = "mise"}
bat = {}
btop = {disabled = "ephemeral"}
chezmoi = {completion = true}
coreutils = {version = "realpath --version"}
curl = {}
direnv = {version = "direnv version"}
difftastic = {manager = "mise", bin = "difft"}
doggo = {manager = "mise", package = "github:mr-karan/doggo"}
dust = {manager = "mise", package = "github:bootandy/dust"}
eza = {manager = "mise"}
fd = {}
fzf = {}
gh = {}
git = {}
git-delta = {bin = "delta"}
glow = {manager = "mise", package = "github:charmbracelet/glow"}
gnupg = {bin = "gpg"}
greyproxy = {disabled = "ephemeral", manager = "mise", package = "github:GreyhavenHQ/greyproxy"}
greywall = {disabled = "ephemeral", manager = "mise", package = "github:GreyhavenHQ/greywall", completion = true}
hyperfine = {manager = "mise"}
jnv = {manager = "mise", package = "github:ynqa/jnv"}
jq = {}
lazygit = {manager = "mise"}
mise = {completion = true}
mkcert = {manager = "mise"}
neovim = {bin = "nvim"}
openssh-client = {bin = "ssh", test = "command -v ssh && command -v ssh-agent && command -v ssh-add"}
ouch = {manager = "mise", package = "github:ouch-org/ouch"}
rage = {manager = "mise", package = "github:str4d/rage"}
rclone = {}
ripgrep = {bin = "rg"}
sd = {manager = "mise"}
tealdeer = {bin = "tldr"}
tmux = {version = "tmux -V"}
topgrade = {manager = "mise", package = "github:topgrade-rs/topgrade"}
vivid = {manager = "mise"}
wget = {}
xh = {manager = "mise", package = "github:ducaale/xh"}
yazi = {manager = "mise", package = "github:sxyazi/yazi"}
zoxide = {}

[packages.base.docker]
dive = {manager = "mise", package = "github:wagoodman/dive"}
docker = {completion = true}
docker-buildx = {version = "docker buildx version"}
docker-compose = {version = "docker compose version"}
lazydocker = {manager = "mise", package = "aqua:jesseduffield/lazydocker"}

[packages.base.extra]
gocryptfs = {disabled = "headless,restricted", version = "gocryptfs -version"}
qrencode = {}

[packages.base.golang]
go = {manager = "mise", version = "go version"}

[packages.base.iac]
opentofu = {manager = "mise", package = "aqua:opentofu/opentofu", bin = "tofu", version = "tofu version"}
sops = {manager = "mise"}
terragrunt = {manager = "mise", completion = {repo = "thuandt/zsh-terraform@master", path = "_terragrunt"}}

[packages.base.java]
java = {manager = "mise", version = "java -version", pin = "lts"}
maven = {manager = "mise", bin = "mvn", version = "mvn -v"}

[packages.base.kubernetes]
helm = {manager = "mise", version = "helm version"}
helm-diff = {manager = "helm", package = "https://github.com/databus23/helm-diff", version = "helm diff --help"}
k3d = {manager = "mise", version = "k3d version", completion = {generate = "k3d completion zsh"}}
k9s = {manager = "mise", version = "k9s version"}
kubecolor = {manager = "mise", version = "kubecolor help", completion = {generate = "kubectl completion zsh", refresh = "kubectl version --client", sed = "s/kubectl/kubecolor/g"}}
kubectl = {manager = "mise", version = "kubectl version --client"}
kubectl-access-matrix = {manager = "krew"}
kubectl-get-all = {manager = "krew"}
kubectl-neat = {manager = "krew"}
kubectl-node-shell = {manager = "krew", version = "kubectl node-shell --version"}
kubectl-rbac-tool = {manager = "krew"}
kubectl-tree = {manager = "krew"}
kubescape = {manager = "mise", package = "aqua:kubescape/kubescape", version = "kubescape help"}
kustomize = {manager = "mise", version = "kustomize version"}
oc = {manager = "mise", version = "oc version --client"}
stern = {manager = "mise", completion = {generate = "stern --completion zsh"}}
yq = {manager = "mise", completion = {generate = "yq shell-completion zsh"}}

[packages.base.kubernetes.kubesess]
manager = "mise"
package = "github:Ramilito/kubesess"
version = "kubesess --help"

[packages.base.kubernetes.kubesess.platforms]
linux-arm64 = {bin_path = "target/aarch64-unknown-linux-gnu/release"}
linux-x64 = {bin_path = "target/x86_64-unknown-linux-gnu/release"}
macos-arm64 = {bin_path = "target/aarch64-apple-darwin/release"}
macos-x64 = {bin_path = "target/x86_64-apple-darwin/release"}

[packages.base.node]
node = {manager = "mise", pin = "lts", test = "node --version && npm --version && yarn --version && pnpm --version"}

[packages.base.opencode]
opencode = {manager = "mise"}

[packages.base.pi]
pi = {manager = "mise", package = "npm:@earendil-works/pi-coding-agent"}

[packages.base.python]
python = {manager = "mise", bin = "python3"}
uv = {manager = "mise"}

[packages.base.rust]
rust = {manager = "mise", bin = "rustc"}
