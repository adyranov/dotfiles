[ai.base.agents.opencode.instructions]
files = ["AGENTS.md"]

[ai.base.agents.opencode.permissions]
deny = ["~/.config/opencode/auth.json"]

[ai.base.agents.opencode.profiles.core]
extends = "minimal"
plugins = ["@plannotator/opencode"]

[ai.base.agents.opencode.profiles.factory]
extends = "core"
default_agent = "orchestrator"
plugins = ["oh-my-opencode-slim"]
disabled_agents = ["build", "explore", "general", "plan", "scout"]
plannotator_planning_agents = ["orchestrator"]
skills_paths = ["~/.config/opencode/profiles/factory/skills"]

[ai.base.agents.opencode.profiles.minimal]
plugins = ["@tarquinen/opencode-dcp", "opencode-notify"]

[ai.base.agents.opencode.sandbox.network]
allow = [
  {host = "opencode.ai", port = 443},
  {host = "docs.opencode.ai", port = 443}
]

[ai.base.agents.opencode.sandbox.paths]
allow_read = ["~/.config/opencode/**"]
allow_write = [
  "~/.cache/opencode",
  "~/.cache/opencode/**",
  "~/.local/share/opencode",
  "~/.local/share/opencode/**",
  "~/.local/state/opencode",
  "~/.local/state/opencode/**"
]

[ai.base.agents.opencode.settings]
autoupdate = "notify"
share = "disabled"
snapshot = true

[ai.base.agents.opencode.settings.compaction]
auto = true
reserved = 10000

[ai.base.agents.opencode.settings.tool_output]
max_bytes = 51200
max_lines = 2000

[ai.base.agents.opencode.settings.watcher]
ignore = [
  ".cache/**",
  ".direnv/**",
  ".git/**",
  ".terraform/**",
  "build/**",
  "dist/**",
  "node_modules/**"
]

[ai.base.agents.opencode.skills]
paths = ["~/.config/agents/skills"]
