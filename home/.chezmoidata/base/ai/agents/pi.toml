[ai.base.agents.pi]
settings = {bash_mode = {toggle_shortcut = "ctrl+shift+b", transcript_max_bytes = 524288, transcript_max_lines = 2000}, powerline = {fixed_editor = true, mouse_scroll = true, preset = "full"}, theme = "catppuccin-mocha"}

[ai.base.agents.pi.mcp_servers]

[ai.base.agents.pi.permissions]
deny = [
  "~/.config/pi/agent/auth.json",
  "~/.config/pi/profiles/minimal/auth.json",
  "~/.config/pi/profiles/factory/auth.json"
]

[ai.base.agents.pi.profiles.core]
extends = "minimal"
compaction = {keep_recent_tokens = 8000, reserve_tokens = 8192}
plannotator = {executing = "coder", planning = "architect"}
packages = [
  "@ff-labs/pi-fff",
  "pi-lens",
  "pi-hashline-readmap",
  "pi-mcp-adapter",
  "@plannotator/pi-extension",
  "@juicesharp/rpiv-web-tools",
  "@juicesharp/rpiv-advisor",
  "@juicesharp/rpiv-ask-user-question",
  "@juicesharp/rpiv-btw",
  "@juicesharp/rpiv-args",
  "@juicesharp/rpiv-todo",
  "pi-context",
  "pi-hermes-memory",
  "pi-caveman"
]
skills = ["karpathy-guidelines"]

[ai.base.agents.pi.profiles.core.package_filters]

[ai.base.agents.pi.profiles.factory]
extends = "core"
compaction = {keep_recent_tokens = 20000, reserve_tokens = 16384}
packages = [
  "@juicesharp/rpiv-i18n",
  "@juicesharp/rpiv-workflow",
  "@juicesharp/rpiv-pi",
  "@tintinweb/pi-subagents",
  "pi-observational-memory"
]

[ai.base.agents.pi.profiles.minimal]
compaction = {keep_recent_tokens = 4000, reserve_tokens = 4096}
packages = [
  "@gotgenes/pi-permission-system",
  "@sherif-fanous/pi-catppuccin",
  "pi-powerline-footer",
  "pi-system-prompt"
]
skills = []

[ai.base.agents.pi.sandbox.network]
allow = [{host = "pi.dev", port = 443}]

[ai.base.agents.pi.sandbox.paths]
allow_read = [
  "~/.config/pi/**",
  "~/.config/rpiv-advisor/**",
  "~/.config/rpiv-pi/**",
  "~/.config/rpiv-web-tools/**",
  "~/.config/rpiv-todo/**",
  "~/.config/rpiv-ask-user-question/**",
  "~/.local/share/plannotator/**",
  "**/node_modules/@earendil-works/pi-coding-agent/**"
]
allow_write = [
  "~/.config/pi/agent/npm",
  "~/.config/pi/agent/npm/**",
  "~/.config/pi/agent/sessions",
  "~/.config/pi/agent/sessions/**",
  "~/.config/pi/agent/pi-hermes-memory",
  "~/.config/pi/agent/pi-hermes-memory/**",
  "~/.config/pi/profiles/minimal",
  "~/.config/pi/profiles/minimal/**",
  "~/.config/pi/profiles/factory",
  "~/.config/pi/profiles/factory/**",
  "~/.local/share/plannotator",
  "~/.local/share/plannotator/**",
  "~/.pi-lens"
]
