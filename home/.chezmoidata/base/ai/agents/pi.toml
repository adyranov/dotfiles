[ai.base.agents.pi]
settings = {bash_mode = {toggle_shortcut = "ctrl+shift+b", transcript_max_bytes = 524288, transcript_max_lines = 2000}, powerline = {fixed_editor = true, mouse_scroll = true, preset = "full"}, theme = "catppuccin-mocha"}
subagents = {architect = [
  "oracle",
  "planner",
  "reviewer",
  "sdd-design",
  "sdd-proposal",
  "sdd-spec",
  "sdd-verify"
], coder = [
  "delegate",
  "sdd-apply",
  "sdd-onboard",
  "worker"
], utility = [
  "context-builder",
  "researcher",
  "scout",
  "sdd-archive",
  "sdd-explore",
  "sdd-init",
  "sdd-sync",
  "sdd-tasks"
]}

[ai.base.agents.pi.mcp_servers]
context-mode = {command_path = "context-mode"}
engram = {command = "engram", args = ["mcp", "--tools=agent"]}

[ai.base.agents.pi.packages]
"@ff-labs/pi-fff" = {}
"@gotgenes/pi-permission-system" = {}
"@juicesharp/rpiv-ask-user-question" = {}
"@juicesharp/rpiv-todo" = {}
"@plannotator/pi-extension" = {}
"@sherif-fanous/pi-catppuccin" = {}
pi-btw = {}
context-mode = {}
gentle-engram = {}
gentle-pi = {}
pi-hashline-readmap = {}
pi-intercom = {}
pi-lens = {}
pi-mcp-adapter = {}
pi-powerline-footer = {}
pi-subagents = {}
pi-web-access = {}

[ai.base.agents.pi.sandbox.network]
allow = [
  {host = "*.github.com", port = 443},
  {host = "*.npmjs.org", port = 443},
  {host = "opencode.ai", port = 443},
  {host = "pi.dev", port = 443},
  {host = "*.schemastore.org", port = 443}
]

[ai.base.agents.pi.sandbox.paths]
infrastructure_deny = ["~/.config/pi/agent/auth.json"]
infrastructure_read = [
  "~/.config/pi/**",
  "~/.config/agents/**",
  "~/.config/greywall/**",
  "~/.local/share/engram/**",
  "**/node_modules/@earendil-works/pi-coding-agent/**"
]
allow_write = [
  "~/.config/pi/agent/sessions",
  "~/.config/pi/agent/sessions/**",
  "~/.pi-lens"
]

[ai.base.agents.pi.sandbox.tools]
allow = [
  # pi built-in tools
  "edit",
  "find",
  "grep",
  "ls",
  "read",
  "write",
  # pi-fff (FZF grep/find replacements)
  "fffind",
  "ffgrep",
  # pi-lens (AST & LSP tools)
  "ast_grep_replace",
  "ast_grep_search",
  "lsp_diagnostics",
  "lsp_navigation",
  "ast_search",
  # rpiv (structured interaction)
  "ask_user_question",
  "todo",
  # pi-intercom
  "contact_supervisor",
  "intercom",
  # pi-subagents
  "subagent",
  "task",
  # pi-web-access
  "code_search",
  "fetch_content",
  "get_search_content",
  "web_search",
  # context-mode (sandboxed execution & indexing)
  "ctx_batch_execute",
  "ctx_doctor",
  "ctx_execute",
  "ctx_execute_file",
  "ctx_fetch_and_index",
  "ctx_index",
  "ctx_insight",
  "ctx_search",
  "ctx_stats",
  # plannotator
  "plannotator_submit_plan",
  # gentle-engram memory tools
  "mem_capture_passive",
  "mem_compare",
  "mem_context",
  "mem_current_project",
  "mem_delete",
  "mem_doctor",
  "mem_get_observation",
  "mem_judge",
  "mem_save",
  "mem_save_prompt",
  "mem_search",
  "mem_session_end",
  "mem_session_start",
  "mem_session_summary",
  "mem_stats",
  "mem_suggest_topic_key",
  "mem_timeline",
  "mem_update",
  "external_directory"
]
ask = []
default = "ask"

[ai.base.agents.pi.sandbox.tools.mcp]
allow = ["mcp_describe", "mcp_list", "mcp_search", "mcp_status"]
default = "ask"

[ai.base.agents.pi.sandbox.tools.skill]
default = "allow"
