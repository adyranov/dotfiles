# Level 1 — Process boundary (greywall sandbox)
# Paths and caches that every sandboxed agent process needs.

# Level 2 — Agent restrictions (what the AI model cannot access via tools)
# Auth files for specific agents are in their respective agent configs.
[ai.base.permissions.agent]
deny = [
  # repo / worktree secrets
  "**/.env",
  "**/.env.*",
  "**/.envrc.local",
  "**/.envrc.private",
  "**/.envrc.secret",
  "**/.direnv/**",
  "**/.htpasswd",
  "**/*-key.pem",
  "**/*_rsa",
  "**/*_rsa.pub",
  "**/*_ed25519",
  "**/*_ed25519.pub",
  "**/*id_rsa*",
  "**/*id_ed25519*",
  "**/key.pem",
  "**/private*.pem",
  "**/*.asc",
  "**/*.key",
  "**/*.p8",
  "**/*.p12",
  "**/*.pfx",
  "**/*.jks",
  "**/*.keystore",
  "**/*.kdbx",
  "**/*.tfstate",
  "**/*.tfstate.*",
  "**/*.tfvars",
  "**/*.tfvars.json",
  "**/.terraform/**",
  "**/*kubeconfig*",
  "**/secrets/**",
  "**/.secrets/**",
  "**/credentials/**",
  "**/.credentials/**",
  # macOS
  "~/Library/Keychains/**",
  # identity / crypto
  "~/.ssh/**",
  "~/.config/ssh/**",
  "~/.gnupg/**",
  "~/.local/share/gnupg/**",
  "~/.password-store/**",
  "~/.local/share/pass/**",
  "~/.keys/**",
  "~/.config/age/**",
  "~/.config/sops/**",
  # cloud / infra (both home and repo-local)
  "**/.aws/**",
  "**/.azure/**",
  "**/.boto",
  "**/.config/gcloud/**",
  "**/.config/gh/hosts.yml",
  "**/.config/github-copilot/hosts.json",
  "**/.docker/config.json",
  "**/.netrc",
  "**/.terraform.d/credentials.tfrc.json",
  "**/.terraformrc",
  "~/.aws/**",
  "~/.azure/**",
  "~/.config/containers/auth.json",
  "~/.config/docker/config.json",
  "~/.config/gcloud/**",
  "~/.docker/config.json",
  "~/.docker/trust/private/**",
  "~/.kube/**",
  "~/.local/share/containers/auth.json",
  "~/.pulumi/**",
  "~/.terraform.d/credentials.tfrc.json",
  "~/.terraformrc",
  # git / gh / auth
  "**/.git-credentials",
  "**/.config/git/credentials",
  "~/.git-credentials",
  "~/.config/git/credentials",
  "~/.config/gh/hosts.yml",
  "~/.config/github-copilot/hosts.json",
  "~/.netrc",
  # package managers / build tools
  "**/.npmrc",
  "**/.pnpmrc",
  "**/.pypirc",
  "**/.yarnrc",
  "**/.yarnrc.yml",
  "**/.cargo/credentials",
  "**/.gem/credentials",
  "**/.m2/settings.xml",
  "**/.pip/pip.conf",
  "**/gradle.properties",
  "**/poetry.toml",
  "**/settings.xml",
  "~/.gem/credentials",
  "~/.cargo/credentials",
  "~/.config/gradle/gradle.properties",
  "~/.config/pip/pip.conf",
  "~/.config/pypoetry/auth.toml",
  "~/.gradle/gradle.properties",
  "~/.local/share/cargo/credentials",
  "~/.m2/settings.xml",
  "~/.npm",
  "~/.npm/**",
  "~/.npmrc",
  "~/.pnpmrc",
  "~/.pypirc",
  "~/.yarnrc",
  "~/.yarnrc.yml",
  # service CLIs
  "**/.config/netlify/config.json",
  "**/.config/ngrok/ngrok.yml",
  "**/.config/vercel/auth.json",
  "~/.config/op/**",
  "~/.config/.wrangler/**",
  "~/.config/netlify/config.json",
  "~/.config/ngrok/ngrok.yml",
  "~/.config/turso/**",
  "~/.config/vercel/auth.json",
  "~/.fly/config.yml",
  "~/.huggingface/token",
  "~/.supabase/**",
  # AI agents / model providers
  "**/.anthropic/**",
  "**/.claude/**",
  "**/.codex/**",
  "**/.config/anthropic/**",
  "**/.config/claude/**",
  "**/.config/gemini/**",
  "**/.cursor/**",
  "**/.gemini/**",
  "**/.huggingface/token",
  "**/.openai/**",
  "~/.openai/**",
  "~/.anthropic/**",
  "~/.claude/**",
  "~/.config/claude/**",
  "~/.config/anthropic/**",
  "~/.codex/**",
  "~/.gemini/**",
  "~/.config/gemini/**",
  "~/.continue/**",
  "~/.config/continue/**",
  "~/.cursor/**",
  "~/.config/Cursor/**",
  "~/.windsurf/**",
  "~/.config/Windsurf/**",
  # db/client secrets
  "~/.pgpass",
  "~/.config/pg/pgpass",
  # shell / REPL / CLI history
  "~/.bash_history",
  "~/.zsh_history",
  "~/.history",
  "~/.local/state/bash/history",
  "~/.local/state/zsh/history",
  "~/.local/share/atuin/**",
  "~/.psql_history",
  "~/.mysql_history",
  "~/.mongosh_history",
  "~/.rediscli_history",
  "~/.sqlite_history",
  "~/.lesshst"
]

