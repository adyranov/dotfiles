  "**/.env",
  "**/.env.*",
  "**/.envrc.local",
  "**/.envrc.private",
  "**/.envrc.secret",
  "**/.direnv/**",
  "**/.htpasswd",
  "**/*-key.pem",
  "**/*_rsa",
  "**/*_rsa.pub",
  "**/*_ed25519",
  "**/*_ed25519.pub",
  "**/*id_rsa*",
  "**/*id_ed25519*",
  "**/key.pem",
  "**/private*.pem",
  "**/*.asc",
  "**/*.key",
  "**/*.p8",
