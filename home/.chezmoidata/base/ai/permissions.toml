[ai.base.permissions.paths]
allow_read = [
  "~/.config/certificates/ca-bundle.pem",
  "~/.local/share/engram/**"
]
allow_write = ["~/.local/share/engram/**"]
deny = [
  # repo / worktree secrets
  "**/.env",
  "**/.env.*",
  "**/.envrc.local",
  "**/.envrc.private",
  "**/.envrc.secret",
  "**/.direnv/**",
  "**/.htpasswd",
  "**/*-key.pem",
  "**/key.pem",
  "**/private*.pem",
  "**/*.key",
  "**/*.p8",
  "**/*.p12",
  "**/*.pfx",
  "**/*.jks",
  "**/*.keystore",
  "**/*.kdbx",
  "**/*.tfstate",
  "**/*.tfstate.*",
  "**/*.tfvars",
  "**/*.tfvars.json",
  "**/.terraform/**",
  "**/*kubeconfig*",
  "**/.kube/**",
  "**/secrets/**",
  "**/.secrets/**",
  "**/credentials/**",
  "**/.credentials/**",
  # macOS
  "~/Library/Keychains/**",
  # identity / crypto
  "~/.ssh/**",
  "~/.config/ssh/**",
  "~/.gnupg/**",
  "~/.local/share/gnupg/**",
  "~/.password-store/**",
  "~/.local/share/pass/**",
  "~/.keys/**",
  "~/.config/age/**",
  "~/.config/sops/**",
  # cloud / infra
  "~/.aws/**",
  "~/.azure/**",
  "~/.config/gcloud/**",
  "~/.kube/**",
  "~/.docker/config.json",
  "~/.docker/trust/private/**",
  "~/.config/docker/config.json",
  "~/.config/containers/auth.json",
  "~/.local/share/containers/auth.json",
  "~/.terraform.d/credentials.tfrc.json",
  "~/.terraformrc",
  "~/.pulumi/**",
  # git / gh / auth
  "~/.git-credentials",
  "~/.config/git/credentials",
  "~/.config/gh/hosts.yml",
  "~/.config/github-copilot/hosts.json",
  "~/.netrc",
  # package managers / build tools
  "~/.npmrc",
  "~/.config/npm/npmrc",
  "~/.pnpmrc",
  "~/.yarnrc",
  "~/.yarnrc.yml",
  "~/.pypirc",
  "~/.gem/credentials",
  "~/.cargo/credentials",
  "~/.local/share/cargo/credentials",
  "~/.m2/settings.xml",
  "~/.gradle/gradle.properties",
  "~/.config/gradle/gradle.properties",
  # service CLIs
  "~/.config/op/**",
  "~/.config/.wrangler/**",
  "~/.config/netlify/config.json",
  "~/.config/ngrok/ngrok.yml",
  "~/.config/turso/**",
  "~/.config/vercel/auth.json",
  "~/.fly/config.yml",
  "~/.huggingface/token",
  "~/.supabase/**",
  # AI agents / model providers
  "~/.openai/**",
  "~/.anthropic/**",
  "~/.claude/**",
  "~/.config/claude/**",
  "~/.config/anthropic/**",
  "~/.codex/**",
  "~/.gemini/**",
  "~/.config/gemini/**",
  "~/.config/opencode/**",
  "~/.continue/**",
  "~/.config/continue/**",
  "~/.cursor/**",
  "~/.config/Cursor/**",
  "~/.windsurf/**",
  "~/.config/Windsurf/**",
  # db/client secrets
  "~/.pgpass",
  "~/.config/pg/pgpass",
  # shell / REPL / CLI history
  "~/.bash_history",
  "~/.zsh_history",
  "~/.history",
  "~/.local/state/bash/history",
  "~/.local/state/zsh/history",
  "~/.local/share/atuin/**",
  "~/.psql_history",
  "~/.mysql_history",
  "~/.mongosh_history",
  "~/.rediscli_history",
  "~/.sqlite_history",
  "~/.lesshst"
]
