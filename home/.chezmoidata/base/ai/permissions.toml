[ai.base.permissions.sandbox]
allow_read = [
  "~/.config/certificates/ca-bundle.pem",
  "~/.config/npm/npmrc",
  "~/.config/agents/**",
  "~/.config/greywall/**"
]
allow_write = [
  "~/.cache/npm",
  "~/.cache/npm/**",
  "~/.cache/node-gyp",
  "~/.cache/node-gyp/**",
  "~/.local/state/npm",
  "~/.local/state/npm/**",
  "~/Library/Caches/node-gyp",
  "~/Library/Caches/node-gyp/**"
]
