[settings]
experimental = true

[tasks.apply]
description = "Apply dotfiles changes using chezmoi"
usage = 'arg "[FLAGS]..." var=#true help="Flags to pass to chezmoi apply"'
run = "chezmoi apply ${usage_flags:-}"

[tasks.bootstrap]
description = "Bootstrap development environment (Git hooks, etc.)"
run = "pre-commit install --install-hooks --hook-type pre-commit --hook-type commit-msg"

[tasks.lint]
description = "Run pre-commit hooks on all files"
usage = 'arg "[FLAGS]..." var=#true help="Flags to pass to pre-commit"'
run = "PRE_COMMIT_COLOR=never pre-commit run --all-files --hook-stage pre-commit ${usage_flags:-}"

[tasks.test]
description = "Run dotfiles validation tests"
usage = 'arg "[TOOLS]..." var=#true help="Package keys, --suite NAME, --tag TAG, --filter REGEX, --list"'
run = '~/.local/bin/check-dotfiles ${usage_tools:-}'

[tools]
chezmoi = "latest"
hadolint = "latest"
pre-commit = "latest"
python = "3.14"
shellcheck = "latest"
taplo = "latest"
uv = "latest"
