name: CI Host
on:
  workflow_call:
    inputs:
      matrix:
        type: string
        required: true
  workflow_dispatch:
concurrency:
  group: ci-host-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  host-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.matrix || '["ubuntu-24.04","ubuntu-24.04-arm","macos-26","macos-26-intel"]') }}
      fail-fast: false
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Restore Cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew/api
            ~/Library/Caches/Homebrew/downloads
            ~/.local/share/mise/downloads
            ~/.local/share/helm/plugins
            ~/.local/share/krew/store
          key: chezmoi-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('home/**') }}
          restore-keys: chezmoi-cache-${{ runner.os }}-${{ runner.arch }}-
      - name: Install and test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          MISE_ALWAYS_KEEP_DOWNLOAD: true
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 60
          MISE_HTTP_TIMEOUT: 60
        run: |
          # Install core packages only
          WITHOUT_TOOLCHAINS=true ./install.sh
          # Validate core installation
          zsh -lic 'check-dotfiles'
          # Re-apply with all toolchains enabled
          ./install.sh
          # Validate full installation
          zsh -lic 'check-dotfiles'
      - name: Save Cache
        if: ${{ always() }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew/api
            ~/Library/Caches/Homebrew/downloads
            ~/.local/share/mise/downloads
            ~/.local/share/helm/plugins
            ~/.local/share/krew/store
          key: chezmoi-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('home/**') }}
