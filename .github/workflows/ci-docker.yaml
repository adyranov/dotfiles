name: CI Docker
on:
  workflow_call:
    inputs:
      matrix:
        type: string
        default: '["archlinux","fedora","ubuntu"]'
  schedule:
    - cron: 0 23 * * 6
  workflow_dispatch:
    inputs:
      publish:
        description: Publish docker images
        required: true
        default: false
        type: boolean
concurrency:
  group: ci-docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  docker-build:
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.matrix || '["archlinux","fedora","ubuntu"]') }}
      fail-fast: false
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@c2782c55efa56a01b9c30021db8f5ec3993228a3 # v1.8.0
    with:
      output: image
      push: ${{ (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'schedule' || inputs.publish == true }}
      context: .
      file: containers/${{ matrix.os }}/Dockerfile
      platforms: linux/arm64,linux/amd64
      cache: true
      meta-images: |
        ghcr.io/${{ github.repository }}
        docker.io/${{ github.repository }}
      meta-tags: |
        type=schedule,prefix=${{ matrix.os }}-,pattern={{date 'YYYYMMDD'}}
        type=raw,value=${{ matrix.os }},enable={{is_default_branch}}
        type=ref,event=branch,prefix=${{ matrix.os }}-
        type=ref,event=pr,prefix=${{ matrix.os }}-pr-
      meta-flavor: |
        latest=${{ github.ref_name == 'main' && contains(matrix.os, 'ubuntu') }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
  security-scan:
    needs: [docker-build]
    if: >-
      !cancelled() && ((github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'schedule' || inputs.publish == true)
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 5
    permissions:
      packages: read
      security-events: write
    strategy:
      matrix:
        os: [fedora, ubuntu]
        platform: [linux/amd64, linux/arm64]
      fail-fast: false
    steps:
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ github.token }}
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ matrix.os }}
          ignore-unfixed: true
          vuln-type: os
          severity: CRITICAL,HIGH
          format: sarif
          cache: false
          output: trivy-results-${{ matrix.os }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}.sarif
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: steps.trivy.outcome == 'success'
        with:
          sarif_file: trivy-results-${{ matrix.os }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}.sarif
          category: trivy-${{ matrix.os }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
