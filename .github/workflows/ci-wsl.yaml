name: CI WSL
on:
  workflow_call: {}
  workflow_dispatch:
concurrency:
  group: ci-wsl-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  wsl:
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup WSL
        uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
      - name: Restore Cache
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            \\wsl$\Ubuntu-24.04\root\.local\share\mise\downloads
            \\wsl$\Ubuntu-24.04\var\cache\apt\archives
          key: chezmoi-cache-wsl-${{ hashFiles('home/**') }}
          restore-keys: chezmoi-cache-wsl-
      - name: Run install.sh
        shell: wsl-bash {0}
        run: |
          set -eux
          workspace="$(wslpath '${{ github.workspace }}')"
          cd "$workspace"
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export MISE_ALWAYS_KEEP_DOWNLOAD="true"
          export MISE_FETCH_REMOTE_VERSIONS_TIMEOUT="60"
          export MISE_HTTP_TIMEOUT="60"
          export WITHOUT_TOOLCHAINS="true"
          ./install.sh
      - name: Run check-dotfiles
        shell: wsl-bash {0}
        run: |
          set -eux
          zsh -lic 'check-dotfiles'
      - name: Save Cache
        if: ${{ always() }}
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            \\wsl$\Ubuntu-24.04\root\.local\share\mise\downloads
            \\wsl$\Ubuntu-24.04\var\cache\apt\archives
          key: chezmoi-cache-wsl-${{ hashFiles('home/**') }}
